<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>访问被拦截 - WAF 安全防护</title>
    <meta name="description" content="您的访问请求被 WAF 安全系统拦截">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            200: '#e2e8f0',
                            300: '#cbd5e1',
                            400: '#94a3b8',
                            500: '#64748b',
                            600: '#475569',
                            700: '#334155',
                            800: '#1e293b',
                            900: '#0f172a',
                            950: '#020617',
                        },
                    },
                    animation: {
                        'slide-up': 'slideUp 0.3s ease-out',
                        'slide-down': 'slideDown 0.3s ease-in',
                        'scale-in': 'scaleIn 0.2s ease-out',
                    },
                    keyframes: {
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        slideDown: {
                            '0%': { transform: 'translateY(0)', opacity: '1' },
                            '100%': { transform: 'translateY(20px)', opacity: '0' },
                        },
                        scaleIn: {
                            '0%': { transform: 'scale(0.8)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' },
                        },
                    },
                }
            }
        }
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
        }

        .toast-container {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            pointer-events: none;
        }

        .toast {
            pointer-events: auto;
            animation: toastIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15), 0 0 0 1px rgba(255,255,255,0.1);
        }

        .toast-exit {
            animation: toastOut 0.35s ease-in forwards;
        }

        @keyframes toastIn {
            0% { opacity: 0; transform: scale(0.85) translateY(-12px); }
            60% { transform: scale(1.02) translateY(2px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes toastOut {
            0% { opacity: 1; transform: scale(1) translateY(0); }
            100% { opacity: 0; transform: scale(0.95) translateY(-8px); }
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <div id="toast-container" class="toast-container"></div>

    <script>
        const interceptTime = new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' });

        const icons = {
            shieldAlert: `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"></path><path d="M12 8v4"></path><path d="M12 16h.01"></path></svg>`,
            alertCircle: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" x2="12" y1="8" y2="12"></line><line x1="12" x2="12.01" y1="16" y2="16"></line></svg>`,
            refresh: `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path><path d="M8 16H3v5"></path></svg>`,
            check: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"></path></svg>`
        };

        const app = document.getElementById('app');
        app.innerHTML = `
      <div class="flex min-h-screen items-center justify-center bg-gradient-to-br from-slate-50 via-gray-50 to-slate-100 px-4 py-12 dark:from-slate-950 dark:via-gray-950 dark:to-slate-900 transition-colors">
        <div class="w-full max-w-2xl">
          <div class="overflow-hidden rounded-2xl border border-slate-200/80 bg-white/80 backdrop-blur-sm shadow-xl shadow-slate-200/50 dark:border-slate-800 dark:bg-slate-950/80 dark:shadow-slate-900/50">
            <div class="bg-gradient-to-r from-red-50 via-orange-50 to-red-50 px-6 py-8 dark:from-red-950/30 dark:via-orange-950/20 dark:to-red-950/30">
              <div class="flex items-center justify-center gap-4 text-center -translate-x-4">
                <div class="flex items-center justify-center">
                  <div class="text-6xl">🦊</div>
                </div>
                <div>
                  <h1 class="text-2xl font-bold text-slate-900 dark:text-white">
                    访问被拦截
                  </h1>
                  <p class="mt-1 text-sm text-slate-600 dark:text-slate-400">
                    WAF 安全系统检测到异常访问行为
                  </p>
                </div>
              </div>
            </div>

            <div class="px-6 py-8 space-y-6">
              <div class="rounded-xl border border-slate-200 bg-slate-50/50 p-5 dark:border-slate-800 dark:bg-slate-900/50">
                <div class="flex items-start gap-3">
                  <div class="mt-0.5 text-orange-500">${icons.alertCircle}</div>
                  <div class="flex-1">
                    <h2 class="mb-2 text-sm font-semibold text-slate-900 dark:text-white">
                      拦截原因
                    </h2>
                    <p class="text-sm leading-relaxed text-slate-600 dark:text-slate-400">
                      您的请求触发了安全防护规则，可能包含恶意代码、异常参数或违规操作。为了保护系统安全，该请求已被拦截。
                    </p>
                  </div>
                </div>
              </div>

              <div class="space-y-3">
                <h2 class="text-sm font-semibold text-slate-900 dark:text-white">
                  建议操作
                </h2>
                <ul class="space-y-2">
                  <li class="flex items-center gap-2 text-sm text-slate-600 dark:text-slate-400">
                    <span class="h-1.5 w-1.5 rounded-full bg-slate-400 dark:bg-slate-600"></span>
                    检查您的请求是否包含非法字符或参数
                  </li>
                  <li class="flex items-center gap-2 text-sm text-slate-600 dark:text-slate-400">
                    <span class="h-1.5 w-1.5 rounded-full bg-slate-400 dark:bg-slate-600"></span>
                    清除浏览器缓存和 Cookie 后重试
                  </li>
                  <li class="flex items-center gap-2 text-sm text-slate-600 dark:text-slate-400">
                    <span class="h-1.5 w-1.5 rounded-full bg-slate-400 dark:bg-slate-600"></span>
                    如持续遇到问题，请联系技术支持
                  </li>
                </ul>
              </div>

              <div class="flex gap-3 pt-4">
                <button
                  onclick="window.location.reload()"
                  class="flex flex-1 items-center justify-center gap-2 rounded-xl border border-slate-300 bg-white px-6 py-3 text-sm font-medium text-slate-700 transition-all hover:bg-slate-50 hover:border-slate-400 active:scale-95 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-300 dark:hover:bg-slate-800 dark:hover:border-slate-600"
                >
                  <span class="text-slate-700 dark:text-slate-300">${icons.refresh}</span>
                  重新加载
                </button>
              </div>
            </div>

            <div class="border-t border-slate-200/50 bg-slate-50/50 px-6 py-4 dark:border-slate-800/50 dark:bg-slate-900/30">
              <div class="flex items-center justify-between text-xs text-slate-500 dark:text-slate-500">
                <span>WAF 安全防护系统 v2.0</span>
                <span>拦截时间: ${interceptTime}</span>
              </div>
            </div>
          </div>

          <div class="mt-6 text-center">
            <p class="text-xs text-slate-500 dark:text-slate-500">
              如果您认为这是系统误判，请联系管理员
            </p>
          </div>
        </div>
      </div>
    `;

        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }

        if (window.matchMedia) {
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
                if (e.matches) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            });
        }
    </script>
</body>

</html>
